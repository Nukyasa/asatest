services:
  - type: web
    name: nurdin-adna-svadba
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: supabase
      - key: SUPABASE_BUCKET
        value: wedding-photos
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
