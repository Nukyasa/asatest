services:
  - type: web
    name: nurdin-adna-svadba
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: drive
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_DRIVE_PUBLIC
        value: "true"
      - key: SUPABASE_BUCKET
        value: wedding-photos
      - key: SUPABASE_PHOTOS_TABLE
        value: wedding_photos
      - key: BACKUP_INTERVAL_HOURS
        value: "24"
      - key: BACKUP_ON_CHANGE
        value: "true"
      - key: BACKUP_CHANGE_DELAY_SECONDS
        value: "120"
      - key: STORE_ORIGINAL_UPLOADS
        value: "false"
      - key: MAX_UPLOADS_PER_DEVICE
        value: "50"
      - key: CLOUDINARY_FOLDER
        value: nurdin-adna-svadba
      - key: R2_BUCKET
        value: wedding-photos
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: ADMIN_PASSWORD
        value: Tiguan!323
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
